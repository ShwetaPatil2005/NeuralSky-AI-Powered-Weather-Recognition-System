<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* A fresh, weather-inspired gradient background */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 { 
            color: #1e293b; 
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        input[type="file"] { 
            display: none; 
        }

        .upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .upload-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
        }

        .upload-btn:active {
            transform: translateY(1px);
        }

        #preview {
            max-width: 100%;
            margin-top: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: none;
            object-fit: cover;
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 16px;
            background: linear-gradient(to right, #f0fdf4, #dcfce7);
            border: 1px solid #bbf7d0;
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .result-box.show { 
            display: block; 
        }

        .prediction { 
            font-size: 24px; 
            font-weight: 800; 
            color: #166534;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .confidence { 
            font-size: 15px; 
            color: #15803d; 
            margin-top: 8px; 
            font-weight: 600;
        }

        #loading { 
            display: none; 
            margin-top: 25px; 
            color: #64748b; 
            font-weight: 600;
            font-size: 15px;
            animation: pulse 1.5s infinite;
        }

        /* Smooth fade-in animation for the result */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Weather Classifier</h2>
    
    <label for="imageUpload" class="upload-btn">Upload Image</label>
    <input type="file" id="imageUpload" accept="image/*">
    
    <img id="preview" alt="Image Preview">
    <div id="loading">Analyzing image using MobileNetV2...</div>

    <div id="resultBox" class="result-box">
        <div class="prediction" id="predictionText">Cloudy</div>
        <div class="confidence" id="confidenceText">Confidence: 95%</div>
    </div>
</div>

<script>
    const imageUpload = document.getElementById('imageUpload');
    const preview = document.getElementById('preview');
    const resultBox = document.getElementById('resultBox');
    const predictionText = document.getElementById('predictionText');
    const confidenceText = document.getElementById('confidenceText');
    const loading = document.getElementById('loading');

    imageUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 1. Show local preview
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        resultBox.classList.remove('show');
        loading.style.display = 'block';

        // 2. Prepare payload
        const formData = new FormData();
        formData.append('file', file);

        try {
            // 3. Make request to FastAPI backend
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            // 4. Update UI
            predictionText.innerText = data.prediction;
            confidenceText.innerText = `Confidence: ${data.confidence}`;
            
            loading.style.display = 'none';
            resultBox.classList.add('show');
        } catch (error) {
            console.error("Error communicating with API:", error);
            loading.style.display = 'none';
            alert("Could not connect to the FastAPI backend. Make sure your uvicorn server is running!");
        }
    });
</script>

</body>
</html>
